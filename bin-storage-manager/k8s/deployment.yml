apiVersion: apps/v1
kind: Deployment
metadata:
  name: storage-manager
  labels:
    app: storage-manager
spec:
  replicas: 2
  selector:
    matchLabels:
      app: storage-manager
  template:
    metadata:
      labels:
        app: storage-manager
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "2112"
    spec:
      containers:
        - name: storage-manager
          image: storage-manager-image
          command:
            - './storage-manager'
          env:
            - name: DATABASE_DSN
              valueFrom:
                secretKeyRef:
                  name: bin-manager-secrets
                  key: DATABASE_DSN_BIN
            - name: PROMETHEUS_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: bin-manager-secrets
                  key: PROMETHEUS_ENDPOINT
            - name: PROMETHEUS_LISTEN_ADDRESS
              valueFrom:
                secretKeyRef:
                  name: bin-manager-secrets
                  key: PROMETHEUS_LISTEN_ADDRESS
            - name: RABBITMQ_ADDRESS
              valueFrom:
                secretKeyRef:
                  name: bin-manager-secrets
                  key: RABBITMQ_ADDRESS
            - name: REDIS_ADDRESS
              valueFrom:
                secretKeyRef:
                  name: bin-manager-secrets
                  key: REDIS_ADDRESS
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: bin-manager-secrets
                  key: REDIS_PASSWORD
            - name: REDIS_DATABASE
              valueFrom:
                secretKeyRef:
                  name: bin-manager-secrets
                  key: REDIS_DATABASE
            - name: GCP_PROJECT_ID
              valueFrom:
                secretKeyRef:
                  name: bin-manager-secrets
                  key: GCP_PROJECT_ID
            - name: GCP_BUCKET_NAME_TMP
              valueFrom:
                secretKeyRef:
                  name: bin-manager-secrets
                  key: GCP_BUCKET_NAME_TMP
            - name: GCP_BUCKET_NAME_MEDIA
              valueFrom:
                secretKeyRef:
                  name: bin-manager-secrets
                  key: GCP_BUCKET_NAME_MEDIA
            - name: JWT_KEY
              valueFrom:
                secretKeyRef:
                  name: bin-manager-secrets
                  key: JWT_KEY
            - name: CLICKHOUSE_ADDRESS
              valueFrom:
                secretKeyRef:
                  name: bin-manager-secrets
                  key: CLICKHOUSE_ADDRESS
          ports:
            - name: metrics
              protocol: "TCP"
              containerPort: 2112
          resources:
            requests:
              cpu: "10m"
              memory: "10M"
            limits:
              cpu: "100m"
              memory: "100M"
