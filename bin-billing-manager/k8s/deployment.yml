apiVersion: apps/v1
kind: Deployment
metadata:
  name: billing-manager
  labels:
    app: billing-manager
spec:
  replicas: 2
  selector:
    matchLabels:
      app: billing-manager
  template:
    metadata:
      labels:
        app: billing-manager
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "2112"
    spec:
      containers:
        - name: billing-manager
          image: billing-manager-image
          command:
            - './billing-manager'
          env:
            - name: DATABASE_DSN
              valueFrom:
                secretKeyRef:
                  name: bin-manager-secrets
                  key: DATABASE_DSN_BIN
            - name: PROMETHEUS_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: bin-manager-secrets
                  key: PROMETHEUS_ENDPOINT
            - name: PROMETHEUS_LISTEN_ADDRESS
              valueFrom:
                secretKeyRef:
                  name: bin-manager-secrets
                  key: PROMETHEUS_LISTEN_ADDRESS
            - name: RABBITMQ_ADDRESS
              valueFrom:
                secretKeyRef:
                  name: bin-manager-secrets
                  key: RABBITMQ_ADDRESS
            - name: REDIS_ADDRESS
              valueFrom:
                secretKeyRef:
                  name: bin-manager-secrets
                  key: REDIS_ADDRESS
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: bin-manager-secrets
                  key: REDIS_PASSWORD
            - name: REDIS_DATABASE
              valueFrom:
                secretKeyRef:
                  name: bin-manager-secrets
                  key: REDIS_DATABASE
            - name: CLICKHOUSE_ADDRESS
              valueFrom:
                secretKeyRef:
                  name: bin-manager-secrets
                  key: CLICKHOUSE_ADDRESS
          ports:
            - name: metrics
              protocol: "TCP"
              containerPort: 2112
          resources:
            requests:
              cpu: "2m"
              memory: "2M"
            limits:
              cpu: "20m"
              memory: "20M"
