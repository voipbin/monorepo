apiVersion: apps/v1
kind: Deployment
metadata:
  name: tts-manager
  labels:
    app: tts-manager
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tts-manager
  template:
    metadata:
      labels:
        app: tts-manager
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "2112"
    spec:
      volumes:
        - name: shared-data
          emptyDir: {}
      containers:
        - name: tts-manager
          image: tts-manager-image
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: DATABASE_DSN
              valueFrom:
                secretKeyRef:
                  name: bin-manager-secrets
                  key: DATABASE_DSN_BIN
            - name: PROMETHEUS_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: bin-manager-secrets
                  key: PROMETHEUS_ENDPOINT
            - name: PROMETHEUS_LISTEN_ADDRESS
              valueFrom:
                secretKeyRef:
                  name: bin-manager-secrets
                  key: PROMETHEUS_LISTEN_ADDRESS
            - name: RABBITMQ_ADDRESS
              valueFrom:
                secretKeyRef:
                  name: bin-manager-secrets
                  key: RABBITMQ_ADDRESS
            - name: REDIS_ADDRESS
              valueFrom:
                secretKeyRef:
                  name: bin-manager-secrets
                  key: REDIS_ADDRESS
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: bin-manager-secrets
                  key: REDIS_PASSWORD
            - name: REDIS_DATABASE
              valueFrom:
                secretKeyRef:
                  name: bin-manager-secrets
                  key: REDIS_DATABASE
            - name: AWS_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: bin-manager-secrets
                  key: AWS_ACCESS_KEY
            - name: AWS_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: bin-manager-secrets
                  key: AWS_SECRET_KEY
            - name: ELEVENLABS_API_KEY
              valueFrom:
                secretKeyRef:
                  name: bin-manager-secrets
                  key: ELEVENLABS_API_KEY
            - name: CLICKHOUSE_ADDRESS
              valueFrom:
                secretKeyRef:
                  name: bin-manager-secrets
                  key: CLICKHOUSE_ADDRESS
          volumeMounts:
            - name: shared-data
              mountPath: /shared-data
          command:
            - './tts-manager'
          ports:
            - name: metrics
              protocol: "TCP"
              containerPort: 2112
          resources:
            requests:
              cpu: "2m"
              memory: "6M"
            limits:
              cpu: "20m"
              memory: "60M"

        - name: http-server
          image: python:3.9-bookworm
          volumeMounts:
            - name: shared-data
              mountPath: /shared-data
          command:
            - 'python3'
          args:
            - '-m'
            - 'http.server'
            - '80'
            - '-d'
            - '/shared-data'
          ports:
            - name: http
              protocol: "TCP"
              containerPort: 80
          resources:
            requests:
              cpu: "2m"
              memory: "3M"
            limits:
              cpu: "20m"
              memory: "30M"
