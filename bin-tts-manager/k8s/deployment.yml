apiVersion: apps/v1
kind: Deployment
metadata:
  name: tts-manager
  labels:
    app: tts-manager
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tts-manager
  template:
    metadata:
      labels:
        app: tts-manager
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "2112"
    spec:
      volumes:
        - name: shared-data
          emptyDir: {}
        - name: google-application-credentials
          secret:
            secretName: voipbin
            items:
              - key: GOOGLE_APPLICATION_CREDENTIALS_JSON
                path: service-account.json
      containers:
        - name: tts-manager
          image: tts-manager-image
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: DATABASE_DSN
              valueFrom:
                secretKeyRef:
                  name: voipbin
                  key: DATABASE_DSN_BIN
            - name: PROMETHEUS_ENDPOINT
              value: "/metrics"
            - name: PROMETHEUS_LISTEN_ADDRESS
              value: ":2112"
            - name: RABBITMQ_ADDRESS
              valueFrom:
                secretKeyRef:
                  name: voipbin
                  key: RABBITMQ_ADDRESS
            - name: REDIS_ADDRESS
              valueFrom:
                secretKeyRef:
                  name: voipbin
                  key: REDIS_ADDRESS
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: voipbin
                  key: REDIS_PASSWORD
            - name: REDIS_DATABASE
              valueFrom:
                secretKeyRef:
                  name: voipbin
                  key: REDIS_DATABASE
            - name: AWS_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: voipbin
                  key: AWS_ACCESS_KEY
            - name: AWS_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: voipbin
                  key: AWS_SECRET_KEY
            - name: ELEVENLABS_API_KEY
              valueFrom:
                secretKeyRef:
                  name: voipbin
                  key: ELEVENLABS_API_KEY
            - name: CLICKHOUSE_ADDRESS
              valueFrom:
                secretKeyRef:
                  name: voipbin
                  key: CLICKHOUSE_ADDRESS
            - name: GOOGLE_APPLICATION_CREDENTIALS
              value: "/var/secrets/google/service-account.json"
          volumeMounts:
            - name: shared-data
              mountPath: /shared-data
            - name: google-application-credentials
              mountPath: /var/secrets/google
              readOnly: true
          command:
            - './tts-manager'
          ports:
            - name: metrics
              protocol: "TCP"
              containerPort: 2112
          resources:
            requests:
              cpu: "100m"
              memory: "64M"
            limits:
              cpu: "500m"
              memory: "256M"

        - name: http-server
          image: python:3.9-bookworm
          volumeMounts:
            - name: shared-data
              mountPath: /shared-data
          command:
            - 'sh'
            - '-c'
            - 'python3 -m http.server 80 -d /shared-data 2>&1'
          ports:
            - name: http
              protocol: "TCP"
              containerPort: 80
          resources:
            requests:
              cpu: "2m"
              memory: "3M"
            limits:
              cpu: "20m"
              memory: "30M"
