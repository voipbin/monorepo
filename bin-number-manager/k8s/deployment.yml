apiVersion: apps/v1
kind: Deployment
metadata:
  name: number-manager
  labels:
    app: number-manager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: number-manager
  template:
    metadata:
      labels:
        app: number-manager
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "2112"
    spec:
      containers:
        - name: number-manager
          image: number-manager-image
          command:
            - './number-manager'
          env:
            - name: DATABASE_DSN
              valueFrom:
                secretKeyRef:
                  name: voipbin
                  key: DATABASE_DSN_BIN
            - name: PROMETHEUS_ENDPOINT
              value: "/metrics"
            - name: PROMETHEUS_LISTEN_ADDRESS
              value: ":2112"
            - name: RABBITMQ_ADDRESS
              valueFrom:
                secretKeyRef:
                  name: voipbin
                  key: RABBITMQ_ADDRESS
            - name: REDIS_ADDRESS
              valueFrom:
                secretKeyRef:
                  name: voipbin
                  key: REDIS_ADDRESS
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: voipbin
                  key: REDIS_PASSWORD
            - name: REDIS_DATABASE
              valueFrom:
                secretKeyRef:
                  name: voipbin
                  key: REDIS_DATABASE
            - name: TWILIO_SID
              valueFrom:
                secretKeyRef:
                  name: voipbin
                  key: TWILIO_SID
            - name: TWILIO_TOKEN
              valueFrom:
                secretKeyRef:
                  name: voipbin
                  key: TWILIO_TOKEN
            - name: TELNYX_CONNECTION_ID
              valueFrom:
                secretKeyRef:
                  name: voipbin
                  key: TELNYX_CONNECTION_ID
            - name: TELNYX_PROFILE_ID
              valueFrom:
                secretKeyRef:
                  name: voipbin
                  key: TELNYX_PROFILE_ID
            - name: TELNYX_TOKEN
              valueFrom:
                secretKeyRef:
                  name: voipbin
                  key: TELNYX_TOKEN
            - name: CLICKHOUSE_ADDRESS
              valueFrom:
                secretKeyRef:
                  name: voipbin
                  key: CLICKHOUSE_ADDRESS
          ports:
            - name: metrics
              protocol: "TCP"
              containerPort: 2112
          resources:
            requests:
              cpu: "3m"
              memory: "2M"
            limits:
              cpu: "30m"
              memory: "20M"
