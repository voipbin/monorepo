apiVersion: apps/v1
kind: Deployment
metadata:
  name: message-manager
  labels:
    app: message-manager
spec:
  replicas: 2
  selector:
    matchLabels:
      app: message-manager
  template:
    metadata:
      labels:
        app: message-manager
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "2112"
    spec:
      containers:
        - name: message-manager
          image: message-manager-image
          command:
            - './message-manager'
          env:
            - name: DATABASE_DSN
              valueFrom:
                secretKeyRef:
                  name: voipbin
                  key: DATABASE_DSN_BIN
            - name: PROMETHEUS_ENDPOINT
              value: "/metrics"
            - name: PROMETHEUS_LISTEN_ADDRESS
              value: ":2112"
            - name: RABBITMQ_ADDRESS
              valueFrom:
                secretKeyRef:
                  name: voipbin
                  key: RABBITMQ_ADDRESS
            - name: REDIS_ADDRESS
              valueFrom:
                secretKeyRef:
                  name: voipbin
                  key: REDIS_ADDRESS
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: voipbin
                  key: REDIS_PASSWORD
            - name: REDIS_DATABASE
              valueFrom:
                secretKeyRef:
                  name: voipbin
                  key: REDIS_DATABASE
            - name: AUTHTOKEN_MESSAGEBIRD
              valueFrom:
                secretKeyRef:
                  name: voipbin
                  key: AUTHTOKEN_MESSAGEBIRD
            - name: AUTHTOKEN_TELNYX
              valueFrom:
                secretKeyRef:
                  name: voipbin
                  key: TELNYX_TOKEN
            - name: CLICKHOUSE_ADDRESS
              valueFrom:
                secretKeyRef:
                  name: voipbin
                  key: CLICKHOUSE_ADDRESS
          ports:
            - name: metrics
              protocol: "TCP"
              containerPort: 2112
          resources:
            requests:
              cpu: "10m"
              memory: "10M"
            limits:
              cpu: "100m"
              memory: "64M"
