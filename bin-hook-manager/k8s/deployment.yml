apiVersion: apps/v1
kind: Deployment
metadata:
  name: hook-manager
  labels:
    app: hook-manager
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hook-manager
  template:
    metadata:
      labels:
        app: hook-manager
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "2112"
    spec:
      containers:
        - name: hook-manager
          image: hook-manager-image
          command:
            - './hook-manager'
          env:
            - name: DATABASE_DSN
              valueFrom:
                secretKeyRef:
                  name: voipbin
                  key: DATABASE_DSN_BIN
            - name: PROMETHEUS_ENDPOINT
              value: "/metrics"
            - name: PROMETHEUS_LISTEN_ADDRESS
              value: ":2112"
            - name: RABBITMQ_ADDRESS
              valueFrom:
                secretKeyRef:
                  name: voipbin
                  key: RABBITMQ_ADDRESS
            - name: REDIS_ADDRESS
              valueFrom:
                secretKeyRef:
                  name: voipbin
                  key: REDIS_ADDRESS
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: voipbin
                  key: REDIS_PASSWORD
            - name: REDIS_DATABASE
              valueFrom:
                secretKeyRef:
                  name: voipbin
                  key: REDIS_DATABASE
            - name: SSL_PRIVKEY_BASE64
              valueFrom:
                secretKeyRef:
                  name: voipbin
                  key: SSL_PRIVKEY_HOOK_BASE64
            - name: SSL_CERT_BASE64
              valueFrom:
                secretKeyRef:
                  name: voipbin
                  key: SSL_CERT_HOOK_BASE64
            - name: PADDLE_WEBHOOK_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: voipbin
                  key: PADDLE_WEBHOOK_SECRET_KEY
          ports:
            - name: metrics
              protocol: "TCP"
              containerPort: 2112
            - name: service-https
              protocol: "TCP"
              containerPort: 443
            - name: service-http
              protocol: "TCP"
              containerPort: 80
          readinessProbe:
            httpGet:
              path: /ping
              port: 443
              scheme: HTTPS
          resources:
            requests:
              cpu: "10m"
              memory: "10M"
            limits:
              cpu: "100m"
              memory: "64M"
