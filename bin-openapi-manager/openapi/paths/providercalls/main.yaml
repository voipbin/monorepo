get:
  summary: List providercalls
  description: |
    Returns a paginated list of providercall audit records. Admin-only
    (PermissionProjectSuperAdmin) — because that role is platform-level,
    the list is cross-customer (matches GET /providercalls/{id} and
    DELETE /providercalls/{id}). Optional `provider_id` filter narrows
    to records for a single provider.
  tags:
    - ProviderCall
  parameters:
    - $ref: '#/components/parameters/PageSize'
    - $ref: '#/components/parameters/PageToken'
    - name: provider_id
      in: query
      required: false
      description: "Optional filter — narrow to providercalls for a single provider. Obtained from the `GET /providers` response."
      schema:
        type: string
        format: uuid
      example: "4dbeabd6-f397-4375-95d2-a38411e07ed1"
  responses:
    '200':
      description: A list of providercalls.
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/CommonPagination'
              - type: object
                properties:
                  result:
                    type: array
                    items:
                      $ref: '#/components/schemas/RouteManagerProviderCall'
    '400':
      description: Bad request. Query params malformed.
    '403':
      description: Forbidden. Caller is not a project super-admin.

post:
  summary: Create a provider call
  description: |
    Admin-triggered outbound call placed through the specified provider. The
    handler bypasses normal dialroute selection (via server-side metadata) and
    preserves the admin-supplied source number verbatim so provider carrier
    allowlists accept it. The created Call(s)/Groupcall(s) are persisted and
    their IDs are returned on the `ProviderCall` record. Admin-only
    (PermissionProjectSuperAdmin).
  tags:
    - ProviderCall
  requestBody:
    content:
      application/json:
        schema:
          type: object
          properties:
            provider_id:
              type: string
              format: uuid
              description: "The provider to force the call through. Obtained from the `GET /providers` response."
              example: "4dbeabd6-f397-4375-95d2-a38411e07ed1"
            flow_id:
              type: string
              format: uuid
              description: "Optional flow to execute after the destination answers. Obtained from the `GET /flows` response."
              example: "00000000-0000-0000-0000-000000000000"
            actions:
              type: array
              items:
                $ref: '#/components/schemas/FlowManagerAction'
              description: "Optional inline actions. Used when no `flow_id` is supplied."
            source:
              $ref: '#/components/schemas/CommonAddress'
            destinations:
              type: array
              items:
                $ref: '#/components/schemas/CommonAddress'
              minItems: 1
              description: "Dial targets. One Call/Groupcall is created per destination."
            anonymous:
              type: string
              enum:
                - "yes"
                - "no"
                - "auto"
              description: "Controls the anonymous caller-ID flag. Defaults to `auto`."
              example: "auto"
          required:
            - provider_id
            - destinations
  responses:
    '200':
      description: The created providercall record.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/RouteManagerProviderCall'
    '400':
      description: Bad request. Required fields missing (`provider_id`, `destinations`), malformed body, unknown `provider_id`, or invalid addresses.
    '403':
      description: Forbidden. Caller is not a project super-admin.
