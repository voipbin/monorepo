get:
  summary: List cases
  description: |
    List cases for the customer, optionally filtered by status, owner_type,
    owner_id, contact_id, and reference_id.
  tags:
    - Case
  parameters:
    - name: status
      in: query
      description: Filter by case status.
      schema:
        type: string
        enum:
          - open
          - closed
        example: "open"
    - name: owner_type
      in: query
      description: Filter by owner type.
      schema:
        type: string
        example: "agent"
    - name: owner_id
      in: query
      description: Filter by owner ID.
      schema:
        type: string
        format: uuid
        example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
    - name: contact_id
      in: query
      description: Filter to cases attributed to this Contact.
      schema:
        type: string
        format: uuid
        example: "b2c3d4e5-f6a7-8901-bcde-f12345678901"
    - name: reference_id
      in: query
      description: Filter to cases whose reference_id (the internal VoIPBin resource ID reference_type points at, e.g. a call ID) exactly matches this value.
      schema:
        type: string
        example: "1fe1356f-3f7f-4ff9-9d33-08136b38f506"
    - $ref: '#/components/parameters/PageSize'
    - $ref: '#/components/parameters/PageToken'
  responses:
    '200':
      description: Successful response.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ContactManagerCaseListResponse'
    '400':
      $ref: '#/components/responses/BadRequest'
    '401':
      $ref: '#/components/responses/Unauthenticated'
    '403':
      $ref: '#/components/responses/PermissionDenied'
    '500':
      $ref: '#/components/responses/InternalError'
