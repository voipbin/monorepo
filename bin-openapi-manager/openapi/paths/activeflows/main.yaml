post:
  summary: Create a new activeflow
  description: Endpoint to create a new activeflow.
  tags:
    - Activeflow
  requestBody:
    description: Request body to create a new activeflow.
    required: true
    content:
      application/json:
        schema:
          type: object
          properties:
            id:
              type: string
              description: ID of the activeflow.
            flow_id:
              type: string
              description: Flow id of.
            actions:
              type: array
              items:
                $ref: '#/components/schemas/FlowManagerAction'
            variables:
              type: object
              additionalProperties:
                type: string
              description: >
                Optional flat key-value context seeded into the new call's flow as runtime variables,
                readable in the flow via ${key}. String values only. Reserved keys starting with
                'voipbin.' are ignored. Max 100 keys, 64KB total.
              example:
                campaign_id: "summer-2026"
                customer_name: "Jane Doe"
  responses:
    '201':
      description: activeflow created successfully.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/FlowManagerActiveflow'
    '400':
      $ref: '#/components/responses/BadRequest'
    '401':
      $ref: '#/components/responses/Unauthenticated'
    '500':
      $ref: '#/components/responses/InternalError'

get:
  summary: List all activeflows
  description: Retrieve a list of all activeflows.
  tags:
    - Activeflow
  parameters:
    - $ref: '#/components/parameters/PageSize'
    - $ref: '#/components/parameters/PageToken'
  responses:
    '200':
      description: Successful response
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/CommonPagination'
              - type: object
                properties:
                  result:
                    type: array
                    items:
                      $ref: '#/components/schemas/FlowManagerActiveflow'
    '401':
      $ref: '#/components/responses/Unauthenticated'
    '500':
      $ref: '#/components/responses/InternalError'
