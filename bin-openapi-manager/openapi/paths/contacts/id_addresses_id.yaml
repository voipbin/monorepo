put:
  summary: Update address on contact
  description: Update an existing address on the contact.
  tags:
    - Contact
  parameters:
    - name: id
      in: path
      description: The ID of the contact.
      required: true
      schema:
        type: string
        format: uuid
        example: 5e4a0680-eba3-4001-a000-000000000001
    - name: address_id
      in: path
      description: The ID of the address returned from POST /contacts/{id}/addresses.
      required: true
      schema:
        type: string
        format: uuid
        example: 5e4a0680-eba3-4001-a000-000000000002
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          properties:
            target:
              type: string
              description: The updated address value. E.164 format for tel, email address for email.
              example: "+155****9999"
            is_primary:
              type: boolean
              description: Whether this is the primary address for the given type.
              example: true
  responses:
    '200':
      description: Address updated successfully.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ContactManagerContact'
    '400':
      $ref: '#/components/responses/BadRequest'
    '401':
      $ref: '#/components/responses/Unauthenticated'
    '403':
      $ref: '#/components/responses/PermissionDenied'
    '404':
      $ref: '#/components/responses/NotFound'
    '500':
      $ref: '#/components/responses/InternalError'

delete:
  summary: Remove address from contact
  description: Remove an address from the contact.
  tags:
    - Contact
  parameters:
    - name: id
      in: path
      description: The ID of the contact.
      required: true
      schema:
        type: string
        format: uuid
        example: 5e4a0680-eba3-4001-a000-000000000001
    - name: address_id
      in: path
      description: The ID of the address returned from POST /contacts/{id}/addresses.
      required: true
      schema:
        type: string
        format: uuid
        example: 5e4a0680-eba3-4001-a000-000000000002
  responses:
    '200':
      description: Address removed successfully.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ContactManagerContact'
    '400':
      $ref: '#/components/responses/BadRequest'
    '401':
      $ref: '#/components/responses/Unauthenticated'
    '403':
      $ref: '#/components/responses/PermissionDenied'
    '404':
      $ref: '#/components/responses/NotFound'
    '500':
      $ref: '#/components/responses/InternalError'
