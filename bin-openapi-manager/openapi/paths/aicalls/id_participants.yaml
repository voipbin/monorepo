get:
  summary: List participants of an AI call
  description: Retrieves a paginated list of AI agents that participated in the specified AI call.
  tags:
    - AI
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
        example: "11111111-1111-1111-1111-111111111111"
      description: "The unique identifier of the AI call. Returned from the `POST /aicalls` or `GET /aicalls` response."
    - $ref: '#/components/parameters/PageSize'
    - $ref: '#/components/parameters/PageToken'
  responses:
    '200':
      description: A paginated list of participants.
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/CommonPagination'
              - type: object
                properties:
                  result:
                    type: array
                    items:
                      $ref: '#/components/schemas/AIManagerParticipant'
    '400':
      $ref: '#/components/responses/BadRequest'
    '401':
      $ref: '#/components/responses/Unauthenticated'
    '403':
      $ref: '#/components/responses/PermissionDenied'
    '404':
      $ref: '#/components/responses/NotFound'
    '500':
      $ref: '#/components/responses/InternalError'
