get:
  summary: Get list of calls
  description: Returns a list of calls for the given customer.
  tags:
    - Call
  parameters:
    - $ref: '#/components/parameters/PageSize'
    - $ref: '#/components/parameters/PageToken'
  responses:
    '200':
      description: A list of calls.
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/CommonPagination'
              - type: object
                properties:
                  result:
                    type: array
                    items:
                      $ref: '#/components/schemas/CallManagerCall'
    '401':
      $ref: '#/components/responses/Unauthenticated'
    '500':
      $ref: '#/components/responses/InternalError'

post:
  summary: Make an outbound call
  description: Creates a temporary flow and initiates a call with the specified flow.
  tags:
    - Call
  requestBody:
    content:
      application/json:
        schema:
          type: object
          properties:
            flow_id:
              type: string
            actions:
              type: array
              items:
                $ref: '#/components/schemas/FlowManagerAction'
            source:
              $ref: '#/components/schemas/CommonAddress'
            destinations:
              type: array
              items:
                $ref: '#/components/schemas/CommonAddress'
            anonymous:
              type: string
              enum:
                - "yes"
                - "no"
                - "auto"
              example: "auto"
              description: >
                Controls anonymous caller ID for outbound PSTN calls.
                "yes" — always send anonymous caller ID (RFC 3323 Privacy header).
                "no" — never anonymize, always show real caller ID.
                "auto" — inherit from incoming call's Privacy header (default).
            variables:
              type: object
              additionalProperties:
                type: string
              description: >
                Optional flat key-value context seeded into the new call's flow as runtime variables,
                readable in the flow via ${key}. String values only. Reserved keys starting with
                'voipbin.' are ignored. Max 100 keys, 64KB total.
              example:
                campaign_id: "summer-2026"
                customer_name: "Jane Doe"
  responses:
    '200':
      description: The details of the created call.
      content:
        application/json:
          schema:
            allOf:
              - type: object
                properties:
                  calls:
                    type: array
                    items:
                      $ref: '#/components/schemas/CallManagerCall'
                  groupcalls:
                    type: array
                    items:
                      $ref: '#/components/schemas/CallManagerGroupcall'
    '400':
      $ref: '#/components/responses/BadRequest'
    '401':
      $ref: '#/components/responses/Unauthenticated'
    '402':
      $ref: '#/components/responses/PaymentRequired'
    '500':
      $ref: '#/components/responses/InternalError'
    '503':
      $ref: '#/components/responses/Unavailable'
