get:
  summary: Get a message by ID
  description: Retrieves the message of the given ID.
  tags:
    - Message
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
      description: The ID of the message.
  responses:
    '200':
      description: The message details.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/MessageManagerMessage'
    '400':
      $ref: '#/components/responses/BadRequest'
    '401':
      $ref: '#/components/responses/Unauthenticated'
    '403':
      $ref: '#/components/responses/PermissionDenied'
    '404':
      $ref: '#/components/responses/NotFound'
    '500':
      $ref: '#/components/responses/InternalError'

delete:
  summary: Delete a message by ID
  description: Deletes the message with the given ID and returns the deleted message.
  tags:
    - Message
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
      description: The ID of the message to delete.
  responses:
    '200':
      description: The deleted message details.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/MessageManagerMessage'
    '400':
      $ref: '#/components/responses/BadRequest'
    '401':
      $ref: '#/components/responses/Unauthenticated'
    '403':
      $ref: '#/components/responses/PermissionDenied'
    '404':
      $ref: '#/components/responses/NotFound'
    '500':
      $ref: '#/components/responses/InternalError'
