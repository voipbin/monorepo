get:
  summary: Get provider by ID
  description: Retrieves the provider details for the specified ID.
  tags:
    - Provider
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
      description: The ID of the provider
  responses:
    '200':
      description: The details of the provider with the specified ID.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/RouteManagerProvider'
    '400':
      $ref: '#/components/responses/BadRequest'
    '401':
      $ref: '#/components/responses/Unauthenticated'
    '403':
      $ref: '#/components/responses/PermissionDenied'
    '404':
      $ref: '#/components/responses/NotFound'
    '500':
      $ref: '#/components/responses/InternalError'

delete:
  summary: Delete provider by ID
  description: Deletes the provider with the specified ID.
  tags:
    - Provider
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
      description: The ID of the provider to delete.
  responses:
    '200':
      description: A confirmation of the deletion.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/RouteManagerProvider'
    '400':
      $ref: '#/components/responses/BadRequest'
    '401':
      $ref: '#/components/responses/Unauthenticated'
    '403':
      $ref: '#/components/responses/PermissionDenied'
    '404':
      $ref: '#/components/responses/NotFound'
    '500':
      $ref: '#/components/responses/InternalError'

put:
  summary: Update provider information
  description: Updates the provider details for the given ID with the provided information.
  tags:
    - Provider
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
      description: The ID of the provider to update.
  requestBody:
    content:
      application/json:
        schema:
          type: object
          properties:
            type:
              $ref: '#/components/schemas/RouteManagerProviderType'
            hostname:
              type: string
            tech_prefix:
              type: string
            tech_postfix:
              type: string
            tech_headers:
              type: object
            name:
              type: string
            detail:
              type: string
            codecs:
              type: string
              description: >
                Comma-separated codec list offered to this provider (e.g. "PCMU,PCMA").
                Empty means server-default negotiation.
                Applied to outgoing PSTN dial attempts only; has no effect on SIP-to-SIP traffic.
              example: "PCMU,PCMA"
          required:
            - type
            - hostname
            - tech_prefix
            - tech_postfix
            - tech_headers
            - name
            - detail
  responses:
    '200':
      description: The updated provider details.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/RouteManagerProvider'
    '400':
      $ref: '#/components/responses/BadRequest'
    '401':
      $ref: '#/components/responses/Unauthenticated'
    '403':
      $ref: '#/components/responses/PermissionDenied'
    '404':
      $ref: '#/components/responses/NotFound'
    '500':
      $ref: '#/components/responses/InternalError'
