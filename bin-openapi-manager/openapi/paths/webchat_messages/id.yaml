get:
  summary: Get webchat message details.
  description: Retrieves detailed information for a specific webchat message by its ID.
  tags:
    - Webchat
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: "The unique identifier of the message. Returned from the `POST /messages` response."
  responses:
    '200':
      description: Details of the requested message.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/WebchatManagerMessage'
    '400':
      $ref: '#/components/responses/BadRequest'
    '401':
      $ref: '#/components/responses/Unauthenticated'
    '403':
      $ref: '#/components/responses/PermissionDenied'
    '404':
      $ref: '#/components/responses/NotFound'
    '500':
      $ref: '#/components/responses/InternalError'

delete:
  summary: Delete a webchat message.
  description: Deletes an existing webchat message by its ID.
  tags:
    - Webchat
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: "The unique identifier of the message. Returned from the `POST /messages` response."
  responses:
    '200':
      description: Message successfully deleted.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/WebchatManagerMessage'
    '400':
      $ref: '#/components/responses/BadRequest'
    '401':
      $ref: '#/components/responses/Unauthenticated'
    '403':
      $ref: '#/components/responses/PermissionDenied'
    '404':
      $ref: '#/components/responses/NotFound'
    '500':
      $ref: '#/components/responses/InternalError'
