get:
  summary: Get details of a conversation account
  description: Fetches details of the conversation account specified by ID.
  tags:
    - Conversation
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
      description: The ID of the conversation account.
  responses:
    '200':
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ConversationManagerAccount'
    '400':
      $ref: '#/components/responses/BadRequest'
    '401':
      $ref: '#/components/responses/Unauthenticated'
    '403':
      $ref: '#/components/responses/PermissionDenied'
    '404':
      $ref: '#/components/responses/NotFound'
    '500':
      $ref: '#/components/responses/InternalError'

put:
  summary: Update a conversation account
  description: Updates the details of the conversation account specified by ID.
  tags:
    - Conversation
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
      description: The ID of the conversation account.
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          properties:
            name:
              type: string
            detail:
              type: string
            secret:
              type: string
            token:
              type: string
            provider_data:
              $ref: '#/components/schemas/ConversationManagerAccountProviderData'
            message_flow_id:
              type: string
              format: uuid
              x-go-type: string
  responses:
    '200':
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ConversationManagerAccount'
    '400':
      $ref: '#/components/responses/BadRequest'
    '401':
      $ref: '#/components/responses/Unauthenticated'
    '403':
      $ref: '#/components/responses/PermissionDenied'
    '404':
      $ref: '#/components/responses/NotFound'
    '500':
      $ref: '#/components/responses/InternalError'

delete:
  summary: Delete a conversation account
  description: Deletes the conversation account specified by ID.
  tags:
    - Conversation
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
      description: The ID of the conversation account.
  responses:
    '200':
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ConversationManagerAccount'
    '400':
      $ref: '#/components/responses/BadRequest'
    '401':
      $ref: '#/components/responses/Unauthenticated'
    '403':
      $ref: '#/components/responses/PermissionDenied'
    '404':
      $ref: '#/components/responses/NotFound'
    '500':
      $ref: '#/components/responses/InternalError'
