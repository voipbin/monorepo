post:
  summary: Cancel customer deletion (recover account).
  description: |
    Cancels a scheduled deletion and restores the account to active state.
    Only works during the 30-day grace period.
    Admin-only endpoint.
  tags:
    - Customer
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
  responses:
    '200':
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/CustomerManagerCustomerAdmin'
    '400':
      $ref: '#/components/responses/BadRequest'
    '401':
      $ref: '#/components/responses/Unauthenticated'
    '403':
      $ref: '#/components/responses/PermissionDenied'
    '404':
      $ref: '#/components/responses/NotFound'
    '500':
      $ref: '#/components/responses/InternalError'
