get:
  summary: Retrieve customer details.
  description: Fetches detailed information about a specific customer by their ID.
  tags:
    - Customer
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
  responses:
    '200':
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/CustomerManagerCustomerAdmin'
    '401':
      $ref: '#/components/responses/Unauthenticated'
    '403':
      $ref: '#/components/responses/PermissionDenied'
    '404':
      $ref: '#/components/responses/NotFound'
    '500':
      $ref: '#/components/responses/InternalError'

put:
  summary: Update a customer.
  description: Updates the details of an existing customer and returns the updated information.
  tags:
    - Customer
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          properties:
            name:
              type: string
            detail:
              type: string
            email:
              type: string
            phone_number:
              type: string
            address:
              type: string
            webhook_method:
              $ref: '#/components/schemas/CustomerManagerCustomerWebhookMethod'
            webhook_uri:
              type: string
          required:
            - name
            - detail
            - email
            - phone_number
            - address
            - webhook_method
            - webhook_uri
  responses:
    '200':
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/CustomerManagerCustomerAdmin'
    '400':
      $ref: '#/components/responses/BadRequest'
    '401':
      $ref: '#/components/responses/Unauthenticated'
    '403':
      $ref: '#/components/responses/PermissionDenied'
    '404':
      $ref: '#/components/responses/NotFound'
    '500':
      $ref: '#/components/responses/InternalError'

delete:
  summary: Delete a customer.
  description: Removes a customer by their ID.
  tags:
    - Customer
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
  responses:
    '200':
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/CustomerManagerCustomerAdmin'
    '400':
      $ref: '#/components/responses/BadRequest'
    '401':
      $ref: '#/components/responses/Unauthenticated'
    '403':
      $ref: '#/components/responses/PermissionDenied'
    '404':
      $ref: '#/components/responses/NotFound'
    '500':
      $ref: '#/components/responses/InternalError'
