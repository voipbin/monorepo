post:
  summary: Reject an AI prompt proposal.
  description: >
    Marks the proposal as `rejected` without applying it. Only allowed when status is `completed`.
  tags:
    - AI
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: The AI prompt proposal ID.
  responses:
    '200':
      description: The rejected AI prompt proposal record.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AIManagerAIPromptProposal'
    '400':
      $ref: '#/components/responses/BadRequest'
    '401':
      $ref: '#/components/responses/Unauthenticated'
    '403':
      $ref: '#/components/responses/PermissionDenied'
    '404':
      $ref: '#/components/responses/NotFound'
    '409':
      $ref: '#/components/responses/Conflict'
    '500':
      $ref: '#/components/responses/InternalError'
