get:
  summary: Get extension details
  description: Retrieves details of a specific extension by its ID.
  tags:
    - Extension
  parameters:
    - name: id
      in: path
      required: true
      description: The ID of the extension.
      schema:
        type: string
  responses:
    '200':
      description: The extension details.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/RegistrarManagerExtension'
    '400':
      $ref: '#/components/responses/BadRequest'
    '401':
      $ref: '#/components/responses/Unauthenticated'
    '403':
      $ref: '#/components/responses/PermissionDenied'
    '404':
      $ref: '#/components/responses/NotFound'
    '500':
      $ref: '#/components/responses/InternalError'

put:
  summary: Update an extension
  description: Updates an existing extension and returns the updated details.
  tags:
    - Extension
  parameters:
    - name: id
      in: path
      required: true
      description: The ID of the extension.
      schema:
        type: string
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          properties:
            name:
              type: string
            detail:
              type: string
            password:
              type: string
          required:
            - name
            - detail
            - password
  responses:
    '200':
      description: The updated extension.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/RegistrarManagerExtension'
    '400':
      $ref: '#/components/responses/BadRequest'
    '401':
      $ref: '#/components/responses/Unauthenticated'
    '403':
      $ref: '#/components/responses/PermissionDenied'
    '404':
      $ref: '#/components/responses/NotFound'
    '500':
      $ref: '#/components/responses/InternalError'

delete:
  summary: Delete an extension
  description: Deletes an existing extension by its ID.
  tags:
    - Extension
  parameters:
    - name: id
      in: path
      required: true
      description: The ID of the extension.
      schema:
        type: string
  responses:
    '200':
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/RegistrarManagerExtension'
    '400':
      $ref: '#/components/responses/BadRequest'
    '401':
      $ref: '#/components/responses/Unauthenticated'
    '403':
      $ref: '#/components/responses/PermissionDenied'
    '404':
      $ref: '#/components/responses/NotFound'
    '500':
      $ref: '#/components/responses/InternalError'
