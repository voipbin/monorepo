get:
  summary: Returns detailed conversation info
  description: Returns detailed information about a specific conversation by its ID.
  tags:
    - Conversation
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
      description: The ID of the conversation.
  responses:
    '200':
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ConversationManagerConversation'
    '400':
      $ref: '#/components/responses/BadRequest'
    '401':
      $ref: '#/components/responses/Unauthenticated'
    '403':
      $ref: '#/components/responses/PermissionDenied'
    '404':
      $ref: '#/components/responses/NotFound'
    '500':
      $ref: '#/components/responses/InternalError'

put:
  summary: Update conversation info
  description: Updates the details of a specific conversation by its ID.
  tags:
    - Conversation
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
      description: The ID of the conversation.
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          properties:
            owner_type:
              type: string
            owner_id:
              type: string
            name:
              type: string
            detail:
              type: string
  responses:
    '200':
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ConversationManagerConversation'
    '400':
      $ref: '#/components/responses/BadRequest'
    '401':
      $ref: '#/components/responses/Unauthenticated'
    '403':
      $ref: '#/components/responses/PermissionDenied'
    '404':
      $ref: '#/components/responses/NotFound'
    '500':
      $ref: '#/components/responses/InternalError'
