get:
  summary: Get a list of groupcalls
  description: Retrieves a list of groupcalls based on the provided parameters.
  tags:
    - Groupcall
  parameters:
    - $ref: '#/components/parameters/PageSize'
    - $ref: '#/components/parameters/PageToken'
  responses:
    '200':
      description: A list of groupcalls.
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/CommonPagination'
              - type: object
                properties:
                  result:
                    type: array
                    items:
                      $ref: '#/components/schemas/CallManagerGroupcall'
    '401':
      $ref: '#/components/responses/Unauthenticated'
    '500':
      $ref: '#/components/responses/InternalError'

post:
  summary: Create a new groupcall
  description: Creates a new groupcall with the specified information and returns the created groupcall.
  tags:
    - Groupcall
  requestBody:
    content:
      application/json:
        schema:
          type: object
          description: >-
            Provide either flow_id or actions. If both are set, flow_id takes
            precedence and actions is ignored.
          properties:
            source:
              $ref: '#/components/schemas/CommonAddress'
            destinations:
              type: array
              items:
                $ref: '#/components/schemas/CommonAddress'
            flow_id:
              type: string
              format: uuid
              x-go-type: string
              description: >-
                The flow to execute for the groupcall. Provide either flow_id
                or actions; if both are set, flow_id takes precedence and
                actions is ignored. The flow ID returned from the POST /flows
                or GET /flows response.
              example: "d4e5f6a7-b8c9-0123-4567-890abcdef012"
            actions:
              type: array
              minItems: 1
              items:
                $ref: '#/components/schemas/FlowManagerAction'
              description: >-
                Inline actions used to build a temporary flow when flow_id is
                not provided. Provide either flow_id or actions.
            ring_method:
              $ref: '#/components/schemas/CallManagerGroupcallRingMethod'
            answer_method:
              $ref: '#/components/schemas/CallManagerGroupcallAnswerMethod'
          required:
            - source
            - destinations
            - ring_method
            - answer_method
  responses:
    '200':
      description: The created groupcall details.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/CallManagerGroupcall'
    '400':
      $ref: '#/components/responses/BadRequest'
    '401':
      $ref: '#/components/responses/Unauthenticated'
    '402':
      $ref: '#/components/responses/PaymentRequired'
    '500':
      $ref: '#/components/responses/InternalError'
    '503':
      $ref: '#/components/responses/Unavailable'
