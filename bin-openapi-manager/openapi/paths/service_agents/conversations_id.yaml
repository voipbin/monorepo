get:
  summary: Get detailed conversation info
  description: Retrieves detailed information about a specific conversation by its ID.
  tags:
    - Service Agent
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
      description: The ID of the conversation.
  responses:
    '200':
      description: The details of the conversation.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ConversationManagerConversation'
    '400':
      $ref: '#/components/responses/BadRequest'
    '401':
      $ref: '#/components/responses/Unauthenticated'
    '403':
      $ref: '#/components/responses/PermissionDenied'
    '404':
      $ref: '#/components/responses/NotFound'
    '500':
      $ref: '#/components/responses/InternalError'
put:
  summary: Update conversation info
  description: Updates the details of a specific conversation by its ID. Admin and manager callers only.
  tags:
    - Service Agent
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
        example: "828e75ba-ed24-11ec-bbf2-7f0e56ac76f1"
      description: "The unique identifier of the conversation. Returned from the `GET /service_agents/conversations` response."
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          properties:
            owner_type:
              type: string
              example: "agent"
            owner_id:
              type: string
              format: uuid
              example: "d152e69e-105b-11ee-b395-eb18426de979"
            name:
              type: string
              example: "VIP customer"
            detail:
              type: string
              example: "Preferred language: Korean"
  responses:
    '200':
      description: The updated conversation.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ConversationManagerConversation'
    '400':
      $ref: '#/components/responses/BadRequest'
    '401':
      $ref: '#/components/responses/Unauthenticated'
    '403':
      $ref: '#/components/responses/PermissionDenied'
    '404':
      $ref: '#/components/responses/NotFound'
    '500':
      $ref: '#/components/responses/InternalError'
