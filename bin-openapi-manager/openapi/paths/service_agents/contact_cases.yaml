get:
  summary: Get list of contact cases
  description: Retrieves a paginated list of cases for the authenticated agent's customer.
  tags:
    - Service Agent
  parameters:
    - $ref: '#/components/parameters/PageSize'
    - $ref: '#/components/parameters/PageToken'
  responses:
    '200':
      description: A list of cases.
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/CommonPagination'
              - type: object
                properties:
                  result:
                    type: array
                    items:
                      $ref: '#/components/schemas/ContactManagerCase'
    '401':
      $ref: '#/components/responses/Unauthenticated'
    '500':
      $ref: '#/components/responses/InternalError'
