get:
  summary: List contacts
  description: Get contacts for the service agent's customer.
  tags:
    - Service Agent
  parameters:
    - $ref: '#/components/parameters/PageSize'
    - $ref: '#/components/parameters/PageToken'
  responses:
    '200':
      description: Successful response.
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/CommonPagination'
              - type: object
                properties:
                  result:
                    type: array
                    items:
                      $ref: '#/components/schemas/ContactManagerContact'
    '401':
      $ref: '#/components/responses/Unauthenticated'
    '500':
      $ref: '#/components/responses/InternalError'

post:
  summary: Create a new contact
  description: Create a new contact for the service agent's customer.
  tags:
    - Service Agent
  requestBody:
    description: Request body to create a new contact.
    required: true
    content:
      application/json:
        schema:
          type: object
          properties:
            first_name:
              type: string
            last_name:
              type: string
            display_name:
              type: string
            company:
              type: string
            job_title:
              type: string
            source:
              type: string
              enum: [manual, import, api, sync]
            external_id:
              type: string
            notes:
              type: string
            addresses:
              type: array
              description: List of addresses (tel or email) to associate with the contact.
              items:
                type: object
                properties:
                  type:
                    type: string
                    enum: [tel, email]
                    description: Address type. 'tel' for phone numbers, 'email' for email addresses.
                  target:
                    type: string
                    description: The address value. E.164 format for tel (e.g. +155****4567), email address for email.
                  is_primary:
                    type: boolean
                    description: Whether this is the primary address of its type.
            tag_ids:
              type: array
              items:
                type: string
                format: uuid
  responses:
    '201':
      description: Contact created successfully.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ContactManagerContact'
    '400':
      $ref: '#/components/responses/BadRequest'
    '401':
      $ref: '#/components/responses/Unauthenticated'
    '500':
      $ref: '#/components/responses/InternalError'
