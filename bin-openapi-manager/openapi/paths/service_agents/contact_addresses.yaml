get:
  summary: List contact addresses (service agent)
  description: Get a list of contact addresses. Optionally filter by contact_id and/or type.
  tags:
    - ServiceAgent
  parameters:
    - $ref: '#/components/parameters/PageSize'
    - $ref: '#/components/parameters/PageToken'
    - name: contact_id
      in: query
      required: false
      description: Filter by contact ID.
      schema:
        type: string
        format: uuid
        example: 5e4a0680-eba3-4001-a000-000000000001
    - name: type
      in: query
      required: false
      description: Filter by address type.
      schema:
        type: string
        enum: [tel, email]
        example: tel
    - name: unresolved
      in: query
      required: false
      description: >-
        When true, list only unresolved addresses (contact_id IS NULL) for
        the customer — the pool of addresses not yet attached to any
        contact. Mutually exclusive with contact_id; if both are given,
        unresolved=true wins and contact_id is ignored.
      schema:
        type: boolean
        example: true
  responses:
    '200':
      description: Successful response.
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/CommonPagination'
              - type: object
                properties:
                  result:
                    type: array
                    items:
                      $ref: '#/components/schemas/ContactManagerAddress'
    '401':
      $ref: '#/components/responses/Unauthenticated'
    '500':
      $ref: '#/components/responses/InternalError'

post:
  summary: Create a contact address (service agent)
  description: >-
    Create a new address (tel or email) for a contact as a service agent.
    If contact_id is omitted, creates an unresolved address (not yet
    attached to any contact) for the customer's unresolved pool; such an
    address cannot be primary.
  tags:
    - ServiceAgent
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          required:
            - type
            - target
          properties:
            contact_id:
              type: string
              format: uuid
              description: >-
                The ID of the contact to add the address to. Omit to
                create an unresolved address in the customer's unresolved
                pool.
              example: 5e4a0680-eba3-4001-a000-000000000001
            type:
              type: string
              enum: [tel, email]
              description: Address type. 'tel' for phone numbers, 'email' for email addresses.
              example: tel
            target:
              type: string
              description: The address value. E.164 format for tel, email address for email.
              example: "+155****4567"
            name:
              type: string
              description: Optional human-readable label for this address.
              example: "Main Office"
            detail:
              type: string
              description: Optional free-form notes about this address.
              example: "Primary contact number"
            is_primary:
              type: boolean
              description: Whether this is the primary address for the contact.
              example: true
  responses:
    '201':
      description: Address created successfully.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ContactManagerAddress'
    '400':
      $ref: '#/components/responses/BadRequest'
    '401':
      $ref: '#/components/responses/Unauthenticated'
    '403':
      $ref: '#/components/responses/PermissionDenied'
    '404':
      $ref: '#/components/responses/NotFound'
    '500':
      $ref: '#/components/responses/InternalError'
