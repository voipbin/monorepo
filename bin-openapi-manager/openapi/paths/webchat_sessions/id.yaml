get:
  summary: Get webchat session details.
  description: Retrieves detailed information for a specific webchat session by its ID.
  tags:
    - Webchat
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: "The unique identifier of the session. Returned from the `POST /sessions` response."
  responses:
    '200':
      description: Details of the requested session.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/WebchatManagerSession'
    '400':
      $ref: '#/components/responses/BadRequest'
    '401':
      $ref: '#/components/responses/Unauthenticated'
    '403':
      $ref: '#/components/responses/PermissionDenied'
    '404':
      $ref: '#/components/responses/NotFound'
    '500':
      $ref: '#/components/responses/InternalError'

delete:
  summary: Delete a webchat session.
  description: Deletes an existing webchat session by its ID.
  tags:
    - Webchat
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: "The unique identifier of the session. Returned from the `POST /sessions` response."
  responses:
    '200':
      description: Session successfully deleted.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/WebchatManagerSession'
    '400':
      $ref: '#/components/responses/BadRequest'
    '401':
      $ref: '#/components/responses/Unauthenticated'
    '403':
      $ref: '#/components/responses/PermissionDenied'
    '404':
      $ref: '#/components/responses/NotFound'
    '500':
      $ref: '#/components/responses/InternalError'
