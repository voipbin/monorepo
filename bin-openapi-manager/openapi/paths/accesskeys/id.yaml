get:
  summary: Get details of an accesskey
  tags:
    - Accesskey
  parameters:
    - name: id
      in: path
      description: ID of the accesskey
      required: true
      schema:
        type: string
  responses:
    '200':
      description: Accesskey details
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/CustomerManagerAccesskey'
    '400':
      $ref: '#/components/responses/BadRequest'
    '401':
      $ref: '#/components/responses/Unauthenticated'
    '403':
      $ref: '#/components/responses/PermissionDenied'
    '404':
      $ref: '#/components/responses/NotFound'
    '500':
      $ref: '#/components/responses/InternalError'

delete:
  summary: Delete an accesskey
  tags:
    - Accesskey
  parameters:
    - name: id
      in: path
      description: ID of the accesskey
      required: true
      schema:
        type: string
  responses:
    '200':
      description: Accesskey deleted successfully
    '400':
      $ref: '#/components/responses/BadRequest'
    '401':
      $ref: '#/components/responses/Unauthenticated'
    '403':
      $ref: '#/components/responses/PermissionDenied'
    '404':
      $ref: '#/components/responses/NotFound'
    '500':
      $ref: '#/components/responses/InternalError'

put:
  summary: Update an accesskey
  tags:
    - Accesskey
  parameters:
    - name: id
      in: path
      description: ID of the accesskey
      required: true
      schema:
        type: string
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          properties:
            name:
              type: string
            detail:
              type: string
  responses:
    '200':
      description: Accesskey updated successfully
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/CustomerManagerAccesskey'
    '400':
      $ref: '#/components/responses/BadRequest'
    '401':
      $ref: '#/components/responses/Unauthenticated'
    '403':
      $ref: '#/components/responses/PermissionDenied'
    '404':
      $ref: '#/components/responses/NotFound'
    '500':
      $ref: '#/components/responses/InternalError'
