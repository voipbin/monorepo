post:
  summary: Regenerate direct hash for a webchat widget.
  description: Regenerates the direct hash used for anonymous visitor authentication on the specified widget. If no direct hash exists, one is created.
  tags:
    - Webchat
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: "The unique identifier of the widget. Returned from the `POST /widgets` response."
  responses:
    '200':
      description: Direct hash regenerated successfully.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/WebchatManagerWidget'
    '400':
      $ref: '#/components/responses/BadRequest'
    '401':
      $ref: '#/components/responses/Unauthenticated'
    '403':
      $ref: '#/components/responses/PermissionDenied'
    '404':
      $ref: '#/components/responses/NotFound'
    '500':
      $ref: '#/components/responses/InternalError'
