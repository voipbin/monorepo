get:
  summary: Get ai details.
  description: Retrieves detailed information for a specific ai by its ID.
  tags:
    - AI
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
      description: The ID of the ai.
  responses:
    '200':
      description: Details of the requested ai.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AIManagerAI'
    '400':
      $ref: '#/components/responses/BadRequest'
    '401':
      $ref: '#/components/responses/Unauthenticated'
    '403':
      $ref: '#/components/responses/PermissionDenied'
    '404':
      $ref: '#/components/responses/NotFound'
    '500':
      $ref: '#/components/responses/InternalError'

delete:
  summary: Delete a ai.
  description: Deletes an existing ai by its ID.
  tags:
    - AI
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
      description: The ID of the ai.
  responses:
    '200':
      description: AI successfully deleted.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AIManagerAI'
    '400':
      $ref: '#/components/responses/BadRequest'
    '401':
      $ref: '#/components/responses/Unauthenticated'
    '403':
      $ref: '#/components/responses/PermissionDenied'
    '404':
      $ref: '#/components/responses/NotFound'
    '500':
      $ref: '#/components/responses/InternalError'

put:
  summary: Update a ai.
  description: Updates an existing ai's details and returns the updated information.
  tags:
    - AI
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
      description: The ID of the ai.
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          properties:
            name:
              type: string
            detail:
              type: string
            type:
              type: string
              enum: ["normal", "insight"]
              description: "AI type. `normal` (default) is a general-purpose AI. `insight` restricts the AI to the Insight tool set and uses a dedicated system prompt."
              example: "normal"
            engine_model:
              $ref: '#/components/schemas/AIManagerAIEngineModel'
            parameter:
              type: object
              additionalProperties: true
              description: Data associated with the ai's engine, can be dynamic and vary based on the engine type.
            engine_key:
              type: string
              description: API key or credential for the AI engine.
            rag_id:
              type: string
              description: "The knowledge base ID (UUID) for the search_knowledge tool. Returned from the `id` field of the `GET /rags` response. Send empty string or omit to clear."
            init_prompt:
              type: string
            tts_type:
              type: string
              description: Text-to-speech engine type.
            tts_voice_id:
              type: string
              description: Voice ID for the text-to-speech engine.
            stt_type:
              type: string
              description: Speech-to-text engine type.
            stt_language:
              type: string
              description: "STT language in BCP-47 format (e.g., ko-KR, en-US)."
              example: "en-US"
            vad_config:
              $ref: '#/components/schemas/AIManagerVADConfig'
              description: Voice Activity Detection configuration. All fields are optional.
            tool_names:
              type: array
              items:
                $ref: '#/components/schemas/AIManagerToolName'
              description: >-
                List of tool names to enable for this AI. Use ["all"] to
                enable all available tools. For type=insight AIs, only
                Insight tool names are permitted (currently:
                get_contact_interactions, get_conversation_content);
                type=normal AIs may use any Normal tool name or ["all"].
                Mismatched combinations are rejected with a 400.
            auto_aicall_audit_enabled:
              type: boolean
              description: When true, any finished AICall involving this AI is audited automatically.
              example: false
          required:
            - name
            - detail
            - engine_model
            - parameter
            - engine_key
            - init_prompt
            - tts_type
            - tts_voice_id
            - stt_type
  responses:
    '200':
      description: Details of the updated ai.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AIManagerAI'
    '400':
      $ref: '#/components/responses/BadRequest'
    '401':
      $ref: '#/components/responses/Unauthenticated'
    '403':
      $ref: '#/components/responses/PermissionDenied'
    '404':
      $ref: '#/components/responses/NotFound'
    '500':
      $ref: '#/components/responses/InternalError'
