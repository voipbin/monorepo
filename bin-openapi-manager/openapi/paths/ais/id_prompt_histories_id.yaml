get:
  summary: Get a single AI prompt history entry.
  description: Retrieves a specific historical init_prompt entry by its ID.
  tags:
    - AI
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
      description: "The ID of the AI. Returned from the `GET /ais` response."
    - name: history_id
      in: path
      required: true
      schema:
        type: string
      description: "The ID of the prompt history entry. Returned from the `GET /ais/{id}/prompt_histories` response."
  responses:
    '200':
      description: Details of the requested prompt history entry.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AIManagerAIPromptHistory'
    '400':
      $ref: '#/components/responses/BadRequest'
    '401':
      $ref: '#/components/responses/Unauthenticated'
    '403':
      $ref: '#/components/responses/PermissionDenied'
    '404':
      $ref: '#/components/responses/NotFound'
    '500':
      $ref: '#/components/responses/InternalError'
