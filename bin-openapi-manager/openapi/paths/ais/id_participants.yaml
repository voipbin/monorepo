get:
  summary: List AI calls an AI agent participated in
  description: Retrieves a paginated list of AI calls in which the specified AI agent participated.
  tags:
    - AI
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
      description: The ID of the AI agent.
    - $ref: '#/components/parameters/PageSize'
    - $ref: '#/components/parameters/PageToken'
  responses:
    '200':
      description: A paginated list of participants.
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/CommonPagination'
              - type: object
                properties:
                  result:
                    type: array
                    items:
                      $ref: '#/components/schemas/AIManagerParticipant'
    '400':
      $ref: '#/components/responses/BadRequest'
    '401':
      $ref: '#/components/responses/Unauthenticated'
    '403':
      $ref: '#/components/responses/PermissionDenied'
    '404':
      $ref: '#/components/responses/NotFound'
    '500':
      $ref: '#/components/responses/InternalError'
