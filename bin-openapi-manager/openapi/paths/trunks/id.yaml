get:
  summary: Retrieve trunk details.
  description: Retrieves the details of a specific trunk by its ID.
  tags:
    - Trunk
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
  responses:
    '200':
      description: The trunk details.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/RegistrarManagerTrunk'
    '400':
      $ref: '#/components/responses/BadRequest'
    '401':
      $ref: '#/components/responses/Unauthenticated'
    '403':
      $ref: '#/components/responses/PermissionDenied'
    '404':
      $ref: '#/components/responses/NotFound'
    '500':
      $ref: '#/components/responses/InternalError'

put:
  summary: Update a trunk.
  description: Updates the details of an existing trunk and returns the updated trunk's information.
  tags:
    - Trunk
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          properties:
            name:
              type: string
            detail:
              type: string
            auth_types:
              type: array
              items:
                $ref: '#/components/schemas/RegistrarManagerAuthType'
            username:
              type: string
            password:
              type: string
            allowed_ips:
              type: array
              items:
                type: string
          required:
            - name
            - detail
            - auth_types
            - username
            - password
            - allowed_ips
  responses:
    '200':
      description: The updated trunk details.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/RegistrarManagerTrunk'
    '400':
      $ref: '#/components/responses/BadRequest'
    '401':
      $ref: '#/components/responses/Unauthenticated'
    '403':
      $ref: '#/components/responses/PermissionDenied'
    '404':
      $ref: '#/components/responses/NotFound'
    '500':
      $ref: '#/components/responses/InternalError'

delete:
  summary: Delete a trunk.
  description: Deletes an existing trunk by its ID.
  tags:
    - Trunk
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
  responses:
    '200':
      description: Trunk deleted successfully.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/RegistrarManagerTrunk'
    '400':
      $ref: '#/components/responses/BadRequest'
    '401':
      $ref: '#/components/responses/Unauthenticated'
    '403':
      $ref: '#/components/responses/PermissionDenied'
    '404':
      $ref: '#/components/responses/NotFound'
    '500':
      $ref: '#/components/responses/InternalError'
