apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-manager
  labels:
    app: rag-manager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rag-manager
  template:
    metadata:
      labels:
        app: rag-manager
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "2112"
    spec:
      volumes:
        - name: google-application-credentials
          secret:
            secretName: voipbin
            items:
              - key: GOOGLE_APPLICATION_CREDENTIALS_JSON
                path: service-account.json
      containers:
        - name: rag-manager
          image: rag-manager-image
          command:
            - './rag-manager'
          env:
            - name: RABBITMQ_ADDRESS
              valueFrom:
                secretKeyRef:
                  name: voipbin
                  key: RABBITMQ_ADDRESS
            - name: GCP_PROJECT_ID
              valueFrom:
                secretKeyRef:
                  name: voipbin
                  key: GCP_PROJECT_ID
            - name: GCP_REGION
              valueFrom:
                secretKeyRef:
                  name: voipbin
                  key: GCP_REGION
            - name: GOOGLE_EMBEDDING_MODEL
              value: "text-embedding-004"
            - name: RAG_TOP_K
              value: "5"
            - name: PROMETHEUS_ENDPOINT
              value: "/metrics"
            - name: PROMETHEUS_LISTEN_ADDRESS
              value: ":2112"
            - name: POSTGRESQL_DSN
              valueFrom:
                secretKeyRef:
                  name: voipbin
                  key: DATABASE_DSN_POSTGRES
            - name: GOOGLE_APPLICATION_CREDENTIALS
              value: "/var/secrets/google/service-account.json"
          volumeMounts:
            - name: google-application-credentials
              mountPath: /var/secrets/google
              readOnly: true
          ports:
            - name: metrics
              protocol: "TCP"
              containerPort: 2112
          resources:
            requests:
              cpu: "10m"
              memory: "13M"
            limits:
              cpu: "100m"
              memory: "128M"
