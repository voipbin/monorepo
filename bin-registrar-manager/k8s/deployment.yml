apiVersion: apps/v1
kind: Deployment
metadata:
  name: registrar-manager
  labels:
    app: registrar-manager
spec:
  replicas: 2
  selector:
    matchLabels:
      app: registrar-manager
  template:
    metadata:
      labels:
        app: registrar-manager
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "2112"
    spec:
      containers:
        - name: registrar-manager
          image: registrar-manager-image
          command:
            - './registrar-manager'
          env:
            - name: DATABASE_DSN_BIN
              valueFrom:
                secretKeyRef:
                  name: voipbin
                  key: DATABASE_DSN_BIN
            - name: DATABASE_DSN_ASTERISK
              valueFrom:
                secretKeyRef:
                  name: voipbin
                  key: DATABASE_DSN_ASTERISK
            - name: PROMETHEUS_ENDPOINT
              value: "/metrics"
            - name: PROMETHEUS_LISTEN_ADDRESS
              value: ":2112"
            - name: RABBITMQ_ADDRESS
              valueFrom:
                secretKeyRef:
                  name: voipbin
                  key: RABBITMQ_ADDRESS
            - name: REDIS_ADDRESS
              valueFrom:
                secretKeyRef:
                  name: voipbin
                  key: REDIS_ADDRESS
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: voipbin
                  key: REDIS_PASSWORD
            - name: REDIS_DATABASE
              valueFrom:
                secretKeyRef:
                  name: voipbin
                  key: REDIS_DATABASE
            - name: DOMAIN_NAME_EXTENSION
              valueFrom:
                secretKeyRef:
                  name: voipbin
                  key: DOMAIN_NAME_EXTENSION
            - name: DOMAIN_NAME_TRUNK
              valueFrom:
                secretKeyRef:
                  name: voipbin
                  key: DOMAIN_NAME_TRUNK
            - name: CLICKHOUSE_ADDRESS
              valueFrom:
                secretKeyRef:
                  name: voipbin
                  key: CLICKHOUSE_ADDRESS
          ports:
            - name: metrics
              protocol: "TCP"
              containerPort: 2112
          resources:
            requests:
              cpu: "1m"
              memory: "3M"
            limits:
              cpu: "10m"
              memory: "30M"
