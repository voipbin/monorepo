apiVersion: apps/v1
kind: Deployment
metadata:
  name: pipecat-manager
  labels:
    app: pipecat-manager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pipecat-manager
  template:
    metadata:
      labels:
        app: pipecat-manager
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "2112"
    spec:
      containers:
        - name: pipecat-manager
          image: pipecat-manager-image
          command:
            - './pipecat-manager'
          env:
            - name: NODE_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: DATABASE_DSN
              valueFrom:
                secretKeyRef:
                  name: bin-manager-secrets
                  key: DATABASE_DSN_BIN
            - name: PROMETHEUS_ENDPOINT
              value: "/metrics"
            - name: PROMETHEUS_LISTEN_ADDRESS
              value: ":2112"
            - name: RABBITMQ_ADDRESS
              valueFrom:
                secretKeyRef:
                  name: bin-manager-secrets
                  key: RABBITMQ_ADDRESS
            - name: REDIS_ADDRESS
              valueFrom:
                secretKeyRef:
                  name: bin-manager-secrets
                  key: REDIS_ADDRESS
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: bin-manager-secrets
                  key: REDIS_PASSWORD
            - name: REDIS_DATABASE
              valueFrom:
                secretKeyRef:
                  name: bin-manager-secrets
                  key: REDIS_DATABASE

            - name: CARTESIA_API_KEY
              valueFrom:
                secretKeyRef:
                  name: bin-manager-secrets
                  key: CARTESIA_API_KEY
            - name: ELEVENLABS_API_KEY
              valueFrom:
                secretKeyRef:
                  name: bin-manager-secrets
                  key: ELEVENLABS_API_KEY
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: bin-manager-secrets
                  key: OPENAI_API_KEY
            - name: DEEPGRAM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: bin-manager-secrets
                  key: DEEPGRAM_API_KEY
            - name: XAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: bin-manager-secrets
                  key: XAI_API_KEY
            - name: GOOGLE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: bin-manager-secrets
                  key: GOOGLE_API_KEY
            - name: CLICKHOUSE_ADDRESS
              valueFrom:
                secretKeyRef:
                  name: bin-manager-secrets
                  key: CLICKHOUSE_ADDRESS
          ports:
            - name: metrics
              protocol: "TCP"
              containerPort: 2112
            - name: audiosocket
              protocol: "TCP"
              containerPort: 8080
          resources:
            requests:
              cpu: "20m"
              memory: "10Mi"
            limits:
              cpu: "200m"
              memory: "100Mi"

        - name: pipecat-script-runner
          image: pipecat-manager-image
          command:
            - 'python'
            - '/app/scripts/pipecat/main.py'
          env:
            - name: CARTESIA_API_KEY
              valueFrom:
                secretKeyRef:
                  name: bin-manager-secrets
                  key: CARTESIA_API_KEY
            - name: ELEVENLABS_API_KEY
              valueFrom:
                secretKeyRef:
                  name: bin-manager-secrets
                  key: ELEVENLABS_API_KEY
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: bin-manager-secrets
                  key: OPENAI_API_KEY
            - name: DEEPGRAM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: bin-manager-secrets
                  key: DEEPGRAM_API_KEY
            - name: XAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: bin-manager-secrets
                  key: XAI_API_KEY
            - name: GOOGLE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: bin-manager-secrets
                  key: GOOGLE_API_KEY
          resources:
            requests:
              cpu: "20m"
              memory: "50Mi"
            limits:
              cpu: "200m"
              memory: "500Mi"
