apiVersion: apps/v1
kind: Deployment
metadata:
  name: call-manager
  labels:
    app: call-manager
spec:
  replicas: 2
  selector:
    matchLabels:
      app: call-manager
  template:
    metadata:
      labels:
        app: call-manager
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "2112"
    spec:
      containers:
        - name: call-manager
          image: call-manager-image
          command:
            - './call-manager'
          env:
            - name: NODE_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: DATABASE_DSN
              valueFrom:
                secretKeyRef:
                  name: bin-manager-secrets
                  key: DATABASE_DSN_BIN
            - name: PROMETHEUS_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: bin-manager-secrets
                  key: PROMETHEUS_ENDPOINT
            - name: PROMETHEUS_LISTEN_ADDRESS
              valueFrom:
                secretKeyRef:
                  name: bin-manager-secrets
                  key: PROMETHEUS_LISTEN_ADDRESS
            - name: RABBITMQ_ADDRESS
              valueFrom:
                secretKeyRef:
                  name: bin-manager-secrets
                  key: RABBITMQ_ADDRESS
            - name: REDIS_ADDRESS
              valueFrom:
                secretKeyRef:
                  name: bin-manager-secrets
                  key: REDIS_ADDRESS
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: bin-manager-secrets
                  key: REDIS_PASSWORD
            - name: REDIS_DATABASE
              valueFrom:
                secretKeyRef:
                  name: bin-manager-secrets
                  key: REDIS_DATABASE
            - name: HOMER_API_ADDRESS
              valueFrom:
                secretKeyRef:
                  name: bin-manager-secrets
                  key: HOMER_API_ADDRESS
            - name: HOMER_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: bin-manager-secrets
                  key: HOMER_AUTH_TOKEN
            - name: HOMER_WHITELIST
              valueFrom:
                secretKeyRef:
                  name: bin-manager-secrets
                  key: HOMER_WHITELIST
            - name: PROJECT_BASE_DOMAIN
              valueFrom:
                secretKeyRef:
                  name: bin-manager-secrets
                  key: PROJECT_BASE_DOMAIN
            - name: PROJECT_BUCKET_NAME
              valueFrom:
                secretKeyRef:
                  name: bin-manager-secrets
                  key: GCP_BUCKET_NAME_MEDIA
            - name: CLICKHOUSE_ADDRESS
              valueFrom:
                secretKeyRef:
                  name: bin-manager-secrets
                  key: CLICKHOUSE_ADDRESS
          ports:
            - name: metrics
              protocol: "TCP"
              containerPort: 2112
          resources:
            requests:
              cpu: "3m"
              memory: "3M"
            limits:
              cpu: "30m"
              memory: "30M"
