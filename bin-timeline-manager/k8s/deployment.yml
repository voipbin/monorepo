apiVersion: apps/v1
kind: Deployment
metadata:
  name: timeline-manager
  labels:
    app: timeline-manager
spec:
  replicas: 2
  selector:
    matchLabels:
      app: timeline-manager
  template:
    metadata:
      labels:
        app: timeline-manager
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "2112"
    spec:
      containers:
        - name: timeline-manager
          image: timeline-manager-image
          command:
            - './timeline-manager'
          env:
            - name: NODE_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: CLICKHOUSE_ADDRESS
              valueFrom:
                secretKeyRef:
                  name: bin-manager-secrets
                  key: CLICKHOUSE_ADDRESS
            - name: CLICKHOUSE_DATABASE
              valueFrom:
                secretKeyRef:
                  name: bin-manager-secrets
                  key: CLICKHOUSE_DATABASE
            - name: PROMETHEUS_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: bin-manager-secrets
                  key: PROMETHEUS_ENDPOINT
            - name: PROMETHEUS_LISTEN_ADDRESS
              valueFrom:
                secretKeyRef:
                  name: bin-manager-secrets
                  key: PROMETHEUS_LISTEN_ADDRESS
            - name: RABBITMQ_ADDRESS
              valueFrom:
                secretKeyRef:
                  name: bin-manager-secrets
                  key: RABBITMQ_ADDRESS
            - name: HOMER_API_ADDRESS
              valueFrom:
                secretKeyRef:
                  name: bin-manager-secrets
                  key: HOMER_API_ADDRESS
            - name: HOMER_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: bin-manager-secrets
                  key: HOMER_AUTH_TOKEN
            - name: GCS_BUCKET_NAME
              valueFrom:
                secretKeyRef:
                  name: bin-manager-secrets
                  key: GCP_BUCKET_NAME_MEDIA
          ports:
            - name: metrics
              protocol: "TCP"
              containerPort: 2112
          resources:
            requests:
              cpu: "3m"
              memory: "3Mi"
            limits:
              cpu: "30m"
              memory: "64Mi"
